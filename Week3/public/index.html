<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediTrack — Patient Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


<nav>
    <div class="brand"> MediTrack</div>
    <div class="nav-links">
        <a href="#register">Register Patient</a>
        <a href="#patients">View Patients</a>
    </div>
</nav>


<div class="hero">
    <h1>Clinic Management System</h1>
    <p>BIT3208 — Week 3 | Patient Registration</p>
</div>

<div class="container">

    <div class="section-card" id="register">
        <h2>Register New Patient</h2>
        <form id="patientForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="Enter full name">
                <span class="error" id="nameError"></span>
            </div>
            <div class="form-group">
                <label>Age</label>
                <input type="number" id="age" name="age" placeholder="Enter age">
                <span class="error" id="ageError"></span>
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select id="gender" name="gender">
                    <option value="">Select gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
                <span class="error" id="genderError"></span>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="phone" name="phone" placeholder="07XXXXXXXX">
                <span class="error" id="phoneError"></span>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" name="email" placeholder="example@email.com">
                <span class="error" id="emailError"></span>
            </div>
            <button type="submit" class="btn-primary">Register Patient</button>
            <div id="successMsg" class="success-msg"></div>
        </form>
    </div>

    <div class="section-card" id="patients">
        <h2>Registered Patients</h2>
        <button onclick="loadPatients()" class="btn-secondary">Refresh List</button>
        <table id="patientsTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Full Name</th>
                    <th>Age</th>
                    <th>Gender</th>
                    <th>Phone</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody id="patientsBody">
                <tr>
                    <td colspan="6" style="text-align:center">
                        Click Refresh to load patients
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
